<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    color: #d4cfc7;
    font-family: 'Poppins', sans-serif;
    padding: 0;
    max-width: 680px;
    margin: 0 auto;
    font-size: 15px;
    line-height: 1.8;
  }

  .calc-block {
    border-top: 1px solid #2a2a2a;
    border-bottom: 1px solid #2a2a2a;
    padding: 32px 0;
  }

  .calc-eyebrow {
    font-family: 'Roboto Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 8px;
  }

  .calc-title {
    font-size: 17px;
    font-weight: 500;
    color: #f0ece4;
    margin-bottom: 4px;
  }

  .calc-sub {
    font-size: 13px;
    color: #555;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* input row */
  .input-line {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .input-label {
    font-size: 13px;
    color: #777;
    white-space: nowrap;
  }

  .size-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #f0ece4;
    font-family: 'Roboto Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    width: 68px;
    text-align: center;
    outline: none;
    padding: 2px 0;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .size-input::-webkit-outer-spin-button,
  .size-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .size-input:focus { border-color: #B8956A; }

  .size-unit {
    font-size: 12px;
    color: #444;
    font-family: 'Roboto Mono', monospace;
  }

  .calc-btn {
    background: transparent;
    border: 1px solid #2e2e2e;
    border-radius: 2px;
    color: #B8956A;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.3px;
    padding: 8px 22px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .calc-btn:hover {
    border-color: #B8956A;
    background: rgba(184,149,106,0.06);
  }

  .error-msg {
    font-size: 12px;
    color: #7a3a3a;
    margin-top: 8px;
    display: none;
  }

  /* résultats */
  .results {
    display: none;
    margin-top: 28px;
  }
  .results.visible { display: block; }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: #1e1e1e;
    margin-bottom: 16px;
  }

  .rc {
    background: #111;
    padding: 18px 14px;
  }
  .rc.best {
    background: #0f0f0d;
  }

  .rc-eyebrow {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 8px;
  }
  .rc.best .rc-eyebrow { color: #B8956A; }

  .rc-model {
    font-size: 12px;
    font-weight: 500;
    color: #888;
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .rc.best .rc-model { color: #d4cfc7; }

  .rc-size {
    font-family: 'Roboto Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    color: #B8956A;
    line-height: 1;
    margin-bottom: 3px;
  }

  .rc-mm {
    font-size: 11px;
    color: #3a3a3a;
    margin-bottom: 14px;
    font-family: 'Roboto Mono', monospace;
  }
  .rc.best .rc-mm { color: #555; }

  .rc-na {
    font-size: 11px;
    color: #2e2e2e;
    font-style: italic;
    margin-bottom: 14px;
    line-height: 1.4;
  }

  .rc-link {
    font-size: 11px;
    color: #3a3a3a;
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: color 0.15s;
    display: inline-block;
  }
  .rc.best .rc-link { color: #B8956A; }
  .rc-link:hover { color: #f0ece4; }

  .adele-note {
    font-size: 12px;
    color: #444;
    font-style: italic;
    line-height: 1.7;
    padding-left: 12px;
    border-left: 1px solid #222;
  }
  .adele-note strong { color: #B8956A; font-style: normal; font-weight: 400; }

  @media (max-width: 480px) {
    .results-grid { grid-template-columns: 1fr; gap: 1px; }
    .input-line { gap: 10px; }
    .calc-btn { width: 100%; text-align: center; margin-top: 4px; }
  }
</style>
</head>
<body>

<div class="calc-block">
  <p class="calc-eyebrow">Outil de taille</p>
  <h3 class="calc-title">Quelle taille commander ?</h3>
  <p class="calc-sub">Entre ta longueur au repos en centimètres. Maîtresse Adèle te donne la taille exacte à commander sur chaque modèle.</p>

  <div class="input-line">
    <span class="input-label">Ma longueur au repos</span>
    <input type="number" class="size-input" id="sizeInput" min="3" max="20" step="0.5" placeholder="8">
    <span class="size-unit">cm</span>
    <button class="calc-btn" onclick="calculate()">Calculer</button>
  </div>
  <div class="error-msg" id="errorMsg">Entre une valeur entre 3 et 20 cm.</div>

  <div class="results" id="results">
    <div class="results-grid" id="resultCards"></div>
    <p class="adele-note" id="adeleNote"></p>
  </div>
</div>

<script>
const models = [
  {
    name: 'Python V7',
    url: 'https://chastifyme.com/collections/cages-de-chastete/products/cage-chastete-resine-mamba-python-v7',
    sizes: [{l:'XXS',mm:50},{l:'XS',mm:65},{l:'S',mm:80},{l:'M',mm:90},{l:'L',mm:100}]
  },
  {
    name: 'Python V8',
    url: 'https://chastifyme.com/collections/cages-de-chastete/products/cage-de-chastete-python-v8-resine',
    sizes: [{l:'XS',mm:18},{l:'S',mm:34},{l:'M',mm:37},{l:'L',mm:47}]
  },
  {
    name: 'Holy Trainer V4',
    url: 'https://chastifyme.com/collections/cages-de-chastete/products/cage-chastete-resine-holly-trainer-v4',
    sizes: [{l:'S',mm:60},{l:'M',mm:80}]
  }
];

function getBestSize(sizes, targetMm) {
  let best = null;
  for (const s of sizes) {
    if (s.mm >= targetMm && (!best || s.mm < best.mm)) best = s;
  }
  return best || sizes[sizes.length - 1];
}

function calculate() {
  const val = parseFloat(document.getElementById('sizeInput').value);
  const err = document.getElementById('errorMsg');
  const results = document.getElementById('results');
  const cards = document.getElementById('resultCards');
  const note = document.getElementById('adeleNote');

  if (!val || val < 3 || val > 20) {
    err.style.display = 'block';
    results.classList.remove('visible');
    return;
  }
  err.style.display = 'none';

  const targetMm = Math.round((val - 1.5) * 10);
  cards.innerHTML = '';

  models.forEach((m, i) => {
    const size = getBestSize(m.sizes, targetMm);
    const isBest = i === 0;
    const div = document.createElement('div');
    div.className = 'rc' + (isBest ? ' best' : '');
    div.innerHTML = `
      <div class="rc-eyebrow">${isBest ? '✦ recommandé' : m.name.toLowerCase()}</div>
      <div class="rc-model">${m.name}</div>
      <div class="rc-size">${size.l}</div>
      <div class="rc-mm">${size.mm} mm</div>
      <a href="${m.url}" target="_blank" class="rc-link">Voir le produit →</a>
    `;
    cards.appendChild(div);
  });

  const targetCm = (targetMm / 10).toFixed(1);
  note.innerHTML = `Ta cage idéale fait <strong>${targetCm} cm</strong> — ta longueur au repos moins 1,5 cm. En cas de doute entre deux tailles, prends toujours la plus grande.`;
  results.classList.add('visible');
}

document.getElementById('sizeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') calculate();
});
</script>

</body>
</html>
